<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Toggle</title>

    <style>
      body {
        background: rgb(205, 111, 111);
        text-align: center;
        margin: 50px auto;
      }

      .box {
        background: grey;
        padding: 20px;
        border-radius: 10px;
        width: 250px;
        margin: auto;
      }

      input {
        padding: 8px;
        margin: 10px 0;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>Password Toggle</h2>
      <input type="password" id="pass" placeholder="Enter your password" />
      <br />
      <button onclick="togglePassword()">Show / Hide</button>
    </div>

    <script>
      function togglePassword() {
        let input = document.getElementById("pass");
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
